; Cardputer ADV synth — standalone firmware (PlatformIO)
; Build:  pio run -e synth
; Flash:  pio run -e synth -t upload
; Artifact: .pio/build/<env>/firmware.bin
[platformio]
src_dir = src

[env]
platform = espressif32
framework = arduino
board = m5stack-stamps3        ; Stamp-S3A (ESP32-S3FN8, 8MB) — Cardputer ADV core
monitor_speed = 115200
board_build.flash_size = 8MB
build_flags =
    -DCARDPUTER_ADV
lib_deps =
    m5stack/M5Cardputer       ; keyboard + pulls M5Unified/M5GFX; >=1.1.0 supports ADV

; *_test.cpp are host-only (g++); excluded from firmware (each defines main()).

[env:synth]
build_src_filter = -<*> +<synth/> -<synth/*_test.cpp>

[env:synth-usb-midi]
; Audio + USB MIDI. ESP32-S3 native USB-OTG.
build_src_filter = -<*> +<synth/> -<synth/*_test.cpp>
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DSYNTH_USB_MIDI=1

[env:synth-ble-midi]
; Audio + BLE MIDI. Device name "Cardputer Synth".
build_src_filter = -<*> +<synth/> -<synth/*_test.cpp>
build_flags =
    ${env.build_flags}
    -DSYNTH_BLE_MIDI=1
lib_deps =
    ${env.lib_deps}
    lathoub/BLE-MIDI @ ^0.2
